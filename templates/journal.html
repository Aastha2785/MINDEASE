<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindEase - Journal Space</title>
    <style>
        :root {
            --primary: #2D5A27;
            --accent: #4ade80;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .journal-container {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            animation: fadeIn 0.8s ease-out;
        }

        /* Modern Navigation */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-back-nav {
            text-decoration: none;
            color: var(--accent);
            background: rgba(74, 222, 128, 0.1);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(74, 222, 128, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-back-nav:hover {
            background: var(--accent);
            color: #064e3b;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        /* Glassmorphism Writing Workspace */
        .writing-sheet {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 60px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .date-header {
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
            opacity: 0.8;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 40px 0;
        }

        textarea {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1.2rem;
            color: #cbd5e1;
            resize: none;
            min-height: 350px;
            background: transparent;
            line-height: 1.8;
            font-family: 'Inter', sans-serif;
        }

        textarea::placeholder {
            color: rgba(148, 163, 184, 0.3);
            font-style: italic;
        }

        /* Footer Controls */
        .footer-actions {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-save {
            background: var(--accent);
            color: #064e3b;
            padding: 16px 45px;
            border-radius: 18px;
            border: none;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-save:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(74, 222, 128, 0.4);
        }

        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-exit {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-exit:hover { color: #fb7185; }

        /* Glowing AI Result Box */
        #moodResult {
            margin-top: 40px;
            padding: 35px;
            border-radius: 28px;
            background: rgba(74, 222, 128, 0.05);
            border: 1px solid rgba(74, 222, 128, 0.2);
            animation: slideUp 0.5s ease-out;
        }

        #detectedMood {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        #aiSuggestion {
            margin: 0;
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="journal-container">
        <nav class="nav-bar">
            <a href="/dashboard" class="btn-back-nav">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"></polyline></svg>
                Back to dashboard❤️
            </a>
            <div id="charCounter" style="color: var(--text-dim); font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;">// 0 CHARS</div>
        </nav>

        <div class="writing-sheet">
            <span class="date-header" id="currentDate"></span>
            <h1>Write your thoughts💕✨</h1>
            
            <textarea id="journalText" placeholder="The system is ready for your input..."></textarea>
            
            <div class="footer-actions">
                <a href="/dashboard" class="btn-exit">TERMINATE SESSION</a>
                <button onclick="analyzeJournal()" id="submitBtn" class="btn-save">Execute Analysis</button>
            </div>
        </div>

        <div id="moodResult" class="hidden">
            <div id="detectedMood"></div>
            <p id="aiSuggestion"></p>
        </div>
    </div>

    <script>
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        const textarea = document.getElementById('journalText');
        textarea.addEventListener('input', () => {
            document.getElementById('charCounter').innerText = `// ${textarea.value.length} CHARS`;
        });

        async function analyzeJournal() {
            const text = textarea.value;
            const btn = document.getElementById('submitBtn');
            if(!text.trim()) return;

            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/journal', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ entry_text: text })
                });

                const data = await res.json();
                if(res.ok) {
                    document.getElementById('moodResult').classList.remove('hidden');
                    document.getElementById('detectedMood').innerText = "// MOOD DETECTED: " + data.mood;
                    document.getElementById('aiSuggestion').innerText = data.suggestion;
                    btn.innerText = "LOGGED";
                    
                    // Smooth scroll to result
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }
            } catch (err) {
                console.error("Analysis Error:", err);
                btn.innerText = "ERROR";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
