<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MindEase - Focus List</title>
    <style>
        :root {
            --primary: #2D5A27;
            --accent: #4ade80;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .todo-container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* Header Alignment */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .header a {
            text-decoration: none;
            color: var(--accent);
            background: rgba(74, 222, 128, 0.1);
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 700;
            border: 1px solid rgba(74, 222, 128, 0.2);
            transition: 0.3s;
        }

        .header a:hover {
            background: var(--accent);
            color: #064e3b;
        }

        /* Glowing Input Section */
        .input-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 35px;
        }

        #taskInput {
            flex-grow: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 15px;
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        #taskInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.2);
        }

        #deadlineInput {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 10px;
            border-radius: 12px;
            outline: none;
        }

        .btn-add {
            background: var(--accent);
            color: #064e3b;
            border: none;
            padding: 0 30px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
        }

        /* Glassmorphic Task Cards */
        .task-card {
            background: var(--card-bg);
            padding: 22px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--glass-border);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .task-card:hover {
            transform: translateX(10px);
            border-color: rgba(74, 222, 128, 0.3);
            background: rgba(30, 41, 59, 0.9);
        }

        .task-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .checkbox {
            width: 26px;
            height: 26px;
            border: 2px solid var(--accent);
            border-radius: 9px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .completed .checkbox {
            background: var(--accent);
            color: #064e3b;
        }

        .task-text {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .completed .task-text {
            text-decoration: line-through;
            color: var(--text-dim);
            opacity: 0.6;
        }

        .task-date-inline {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent);
            margin-top: 4px;
        }
        span{
            font-size:20px;
        }

        .btn-delete-task {
            background: rgba(225, 29, 72, 0.1);
            border: none;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            color: #fb7185;
            transition: 0.2s;
        }

        .btn-delete-task:hover {
            background: #e11d48;
            color: white;
        }
    </style>
</head>
<body>
<div class="todo-container">
    <header class="header">
        <a href="/dashboard">← BACK</a>
        <h1>Daily Focus</h1>
    </header>

    <div class="input-section">
        <div style="display: flex; gap: 12px;">
            <input type="text" id="taskInput" placeholder="Enter your next objective...">
            <input type="date" id="deadlineInput">
            <button onclick="addTask()" class="btn-add">ADD</button>
        </div>
    </div>

    <div id="taskList"></div>
</div>

<script>
    const token = localStorage.getItem('access_token');
    if (!token) window.location.href = '/'; 

    async function fetchTasks() {
        try {
            const res = await fetch('/api/tasks', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const tasks = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            if (tasks.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:var(--text-dim); margin-top:40px;">System idle. No active tasks found.</p>';
                return;
            }

            list.innerHTML = tasks.map(t => {
                let deadlineHTML = "";
                if (t.deadline) {
                    const dueDate = new Date(t.deadline);
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    const diffTime = dueDate - today;
                    const daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                    if(daysLeft > 1){
                        deadlineHTML = `<span class="task-date-inline"> PENDING: ${daysLeft-1} Days REMAINING</span><span id='ab'>😊</span>`;
                    } else if(daysLeft === 1){
                        deadlineHTML = `<span class="task-date-inline" style="color:#fbbf24;">PRIORITY: DUE TODAY</span><span>😟</span>`;
                    } else {
                        deadlineHTML = `<span class="task-date-inline" style="color:#ef4444;">ALERT: OVERDUE</span><span>😰</span>`;
                    }
                }
if (t.is_completed) {
        deadlineHTML = `<span class="task-date-inline" style="color:#4ade80;">COMPLETED </span><span>✅</span>`;
    }
                return `
                    <div class="task-card ${t.is_completed ? 'completed' : ''}">
                        <div class="task-main">
                            <div class="checkbox" onclick="toggleTask(${t.id})">
                                ${t.is_completed ? '✓' : ''}
                            </div>
                            <div class="task-details">
                                <div class="task-text">${t.title}</div>
                                ${deadlineHTML}
                            </div>
                        </div>
                        <button onclick="removeTask(${t.id})" class="btn-delete-task">🗑️</button>
                    </div>
                `;
            }).join('');
        } catch (err) {
            console.error("Fetch error:", err);
        }
    }

    async function addTask() {
        const titleInput = document.getElementById('taskInput');
        const deadlineInput = document.getElementById('deadlineInput');
        const title = titleInput.value.trim();
        const deadline = deadlineInput.value || null;

        if (!title) return;

        const res = await fetch('/api/tasks', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ title, deadline })
        });

        if (res.ok) {
            titleInput.value = '';
            deadlineInput.value = '';
            fetchTasks();
        }
    }

    async function removeTask(id) {
        if(!confirm("Delete this task from system?")) return;
        const res = await fetch(`/api/tasks/${id}`, {
            method: 'DELETE',
            headers: {'Authorization': `Bearer ${token}`}
        });
        if(res.ok) fetchTasks();
    }

    async function toggleTask(id) {
        const res = await fetch(`/api/tasks/${id}`, {
            method: 'PUT',
            headers: {'Authorization': `Bearer ${token}`}
        });
        if(res.ok) fetchTasks();
    }

    fetchTasks();
</script>
</body>
</html>
