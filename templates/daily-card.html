<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MindEase - Daily Synthesis</title>
    <style>
        :root {
            --accent: #4ade80;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at center, #1e293b, #030712);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: scroll;
        }

        .summary-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            padding: 50px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            text-align: center;
            max-width: 520px;
            box-shadow: 0 0 100px rgba(74, 222, 128, 0.15);
            animation: cardReveal 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .emoji-cloud {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 3.5rem;
            filter: drop-shadow(0 0 15px var(--accent));
        }

        .emoji-float {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: -1.5px;
            margin: 10px 0;
            font-weight: 800;
        }

        .date-sub {
            color: var(--accent);
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-bottom: 35px;
        }

        .stat-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
            display: block;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: 700;
        }

        .ai-message {
            font-style: italic;
            color: #cbd5e1;
            line-height: 1.6;
            margin-top: 30px;
            padding: 20px;
            border-left: 3px solid var(--accent);
            background: rgba(74, 222, 128, 0.05);
        }

        .btn-close {
            margin-top: 40px;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: #94a3b8;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            font-weight: 700;
        }

        .btn-close:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: scale(1.05);
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="summary-card">
    <div id="emoji-cloud" class="emoji-cloud">🌿</div>

    <div class="date-sub" id="display-date">// LOADING...</div>
    <h1 id="dominant-mood-text">Analyzing your day...</h1>

    <div class="stat-row">
        <div class="stat-item">
            <span class="stat-val" id="count-done">0</span>
            <span class="stat-label">Objectives Met</span>
        </div>

        <div class="stat-item">
            <span class="stat-val" id="count-pending">0</span>
            <span class="stat-label">Carried Over</span>
        </div>

        <!-- NEW: Productivity -->
        <div class="stat-item" style="grid-column: span 2;">
            <span class="stat-val" id="productivity">0%</span>
            <span class="stat-label">Productivity</span>
        </div>
    </div>

    <div class="ai-message" id="summary-msg">
        "Analyzing your system logs..."
    </div>

    <a href="/dashboard" class="btn-close">Back to Dashboard 💗</a>
</div>

<script>
async function fetchSummary() {
    const token = localStorage.getItem('access_token');

    try {
        const res = await fetch('/api/daily-summary', {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) {
            throw new Error("API failed");
        }

        const data = await res.json();
        console.log("DATA:", data);  // 🔥 DEBUG

        // Safe updates
        document.getElementById('display-date').innerText =
            `// ${data.date || "N/A"}`;

        document.getElementById('dominant-mood-text').innerText =
            data.quote || "😐";

        document.getElementById('count-done').innerText =
            data.tasks_completed ?? 0;

        document.getElementById('count-pending').innerText =
            data.tasks_remaining ?? 0;

        document.getElementById('productivity').innerText =
            (data.productivity ?? 0) + "%";

        document.getElementById('summary-msg').innerText =
            data.message || "No insights available";

        // Emoji display
        const emojiCloud = document.getElementById('emoji-cloud');

if (data.emojis && data.emojis.length > 0) {
    emojiCloud.innerHTML = data.emojis.map((emoji, index) =>
        `<span class="emoji-float" style="animation-delay:${index * 0.3}s">${emoji}</span>`
    ).join('');
} else {
    emojiCloud.innerHTML = `<span class="emoji-float">🌿</span>`;
}
    } catch (err) {
        console.error("ERROR:", err);

        document.getElementById('dominant-mood-text').innerText = "System Offline";
    }
}

fetchSummary();
</script>

</body>
</html>
