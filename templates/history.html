<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindEase - My Journey</title>
    <style>
        
    :root {
        --primary: #2D5A27;
        --accent: #4ade80;
        --bg-dark: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f8fafc;
        --text-dim: #94a3b8;
    }

    body {
        background: radial-gradient(circle at top right, #1e293b, #0f172a);
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        margin: 0;
        display: flex;
    }

    /* Floating Glass Sidebar */
    .sidebar {
        width: 240px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(20px);
        border-right: 1px solid var(--glass-border);
        padding: 40px 20px;
        position: fixed;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .sidebar h2 { 
        color: var(--accent); 
        font-weight: 800; 
        text-transform: uppercase; 
        letter-spacing: 2px;
        margin-bottom: 50px;
    }

    .nav-item {
        color: var(--text-dim);
        text-decoration: none;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 10px;
        transition: 0.3s;
        font-weight: 500;
    }

    .nav-item:hover, .nav-item.active {
        background: rgba(74, 222, 128, 0.1);
        color: var(--accent);
        box-shadow: inset 0 0 10px rgba(74, 222, 128, 0.1);
    }

    /* Centered Content with Timeline Rail */
    .main-content {
        margin-left: 280px;
        padding: 60px 40px;
        flex-grow: 1;
        max-width: 800px;
    }

    .section-header h1 {
        font-size: 3.5rem;
        font-weight: 900;
        letter-spacing: -2px;
        background: linear-gradient(to bottom right, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* The Timeline Rail */
    #historyTimeline {
        position: relative;
        padding: 40px 0;
    }

    #historyTimeline::before {
        content: '';
        position: absolute;
        left: 20px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: linear-gradient(to bottom, var(--accent), transparent);
        opacity: 0.3;
    }

    .date-container {
        position: relative;
        margin-bottom: 60px;
        padding-left: 60px;
    }

    .date-pill {
        position: absolute;
        left: 0;
        top: -5px;
        background: var(--accent);
        color: #064e3b;
        padding: 4px 12px;
        border-radius: 8px;
        font-size: 0.75rem;
        font-weight: 800;
        box-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
    }

    .entries-box {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 10px 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .entry-item {
        padding: 25px 0;
        border-bottom: 1px solid var(--glass-border);
    }

    .mood-badge {
        font-size:20px;
        color: var(--accent);
        
        
        
        
        font-weight: 700;
        text-transform: uppercase;
    }

    .journal-text {
        font-size: 1.1rem;
        color: #cbd5e1;
        line-height: 1.8;
        margin-top: 15px;
    }

    .btn-delete {
        background: rgba(225, 29, 72, 0.1);
        color: #fb7185;
        border: none;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-delete:hover { background: #e11d48; color: white; }

        .entry-item:hover .btn-delete { opacity: 1; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>MindEase</h2>
        <a href="/dashboard" class="nav-item">🏠 Dashboard</a>
        <a href="/journal" class="nav-item">✍️ New Journal</a>
        <a href="/todo" class="nav-item">✅ To-Do List</a>
        <a href="/history" class="nav-item" style="background: var(--accent); color: var(--primary);">📜 History</a>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <a href="/" class="nav-item" style="color: #E11D48;">🚪 Logout</a>
    </aside>

    <main class="main-content">
        <header class="section-header">
            <h1>My Journey</h1>
            <p>A timeline of your thoughts and growth.</p>
        </header>

        <div id="historyTimeline">
            </div>
    </main>

    <script>
        async function loadHistory() {
            const token = localStorage.getItem('access_token');
            const res = await fetch('/api/journal-history', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const groupedData = await res.json();
            const timeline = document.getElementById('historyTimeline');
            timeline.innerHTML = '';

            for (const [date, entries] of Object.entries(groupedData)) {
                const dateDiv = document.createElement('div');
                dateDiv.className = 'date-container';
                
                dateDiv.innerHTML = `
                    <div class="date-pill">${date}</div>
                    <div class="entries-box">
                        ${entries.map(e => `
                            <div class="entry-item" id="entry-${e.id}">
                                <div class="entry-top">
                                    <div>
                                        <div class="mood-badge">${e.predicted_mood}</div><br>
                                        <div class="entry-time">${e.time}</div>
                                    </div>
                                    
                                </div>
                                <p class="journal-text">${e.entry_text}</p>
                                <button class="btn-delete" onclick="deleteEntry(${e.id})">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                    </button>
                            </div>
                        `).join('')}
                    </div>
                `;
                timeline.appendChild(dateDiv);
            }
        }

        async function deleteEntry(id) {
            if(!confirm("Delete this memory?")) return;
            const res = await fetch(`/api/journal-history/${id}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${localStorage.getItem('access_token')}`}
            });
            if(res.ok) {
                const item = document.getElementById(`entry-${id}`);
                item.style.opacity = '0';
                setTimeout(() => item.remove(), 300);
            }
        }

        loadHistory();
    </script>
</body>
</html>
