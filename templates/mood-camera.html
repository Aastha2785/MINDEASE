<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindEase - Mood Camera</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --accent: #4ade80;
            --card-bg: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            max-width: 620px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .back-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .back-btn:hover { color: var(--accent); border-color: var(--accent); }

        h2 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .camera-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 620px;
            text-align: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #000;
            aspect-ratio: 4/3;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 20px;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }

        .live-mood-overlay {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--accent), transparent);
            animation: scanMove 2s linear infinite;
            opacity: 0.7;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .mood-result {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
            min-height: 80px;
        }

        .mood-badge {
            display: inline-block;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .suggestion-text {
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.6;
            font-style: italic;
            border-left: 3px solid var(--accent);
            padding-left: 12px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .btn-capture {
            background: var(--accent);
            color: #0f172a;
        }

        .btn-capture:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
        }

        .btn-capture:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .saved-msg {
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 12px;
            display: none;
            text-align: center;
        }

        .status-pill {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .analyzing-text {
            color: #94a3b8;
            font-size: 0.9rem;
            padding: 15px;
        }

        @media (max-width: 768px) {
            .btn { padding: 10px 20px; font-size: 0.85rem; }
            h2 { font-size: 1.2rem; }
            .camera-card { padding: 18px; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="/dashboard" class="back-btn">← Back</a>
    <h2>📸 Mood Camera</h2>
</div>

<div class="camera-card">
    <div class="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="scan-line"></div>
        <div class="live-mood-overlay" id="live-mood">🔍 Detecting face...</div>
    </div>

    <p class="status-pill" id="status-pill">Live mood detection — updates every 4 seconds</p>

    <div class="mood-result" id="mood-result">
        <p class="analyzing-text">⏳ Waiting for face detection...</p>
    </div>

    <div class="btn-row">
        <button class="btn btn-capture" id="btn-save" onclick="saveMemory()" disabled>
            📸 Save as Memory
        </button>
    </div>

    <p class="saved-msg" id="saved-msg">✅ Saved to your history!</p>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let currentMood = null;
    let currentSuggestion = null;
    let isAnalyzing = false;
    let faceDetected = false;
    let lastLandmarks = null;

    const token = localStorage.getItem('access_token');
    if (!token) { window.location.href = '/'; }

    // MediaPipe Setup
    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    faceMesh.onResults(onResults);

    function onResults(results) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            faceDetected = true;
            lastLandmarks = results.multiFaceLandmarks[0];

            // Draw green dots on face landmarks
            for (const landmark of lastLandmarks) {
                ctx.beginPath();
                ctx.arc(landmark.x * canvas.width, landmark.y * canvas.height, 1.2, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(74, 222, 128, 0.6)';
                ctx.fill();
            }

            document.getElementById('btn-save').disabled = currentMood ? false : true;

        } else {
            faceDetected = false;
            lastLandmarks = null;
            document.getElementById('live-mood').innerText = '❌ No face detected';
            document.getElementById('btn-save').disabled = true;
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: 640, height: 480 }
            });
            video.srcObject = stream;

            video.onloadedmetadata = () => {
                const camera = new Camera(video, {
                    onFrame: async () => {
                        await faceMesh.send({ image: video });
                    },
                    width: 640,
                    height: 480
                });
                camera.start();
            };

            // Analyze every 4 seconds
            setInterval(() => {
                if (faceDetected && lastLandmarks && !isAnalyzing) {
                    analyzeLandmarks();
                }
            }, 4000);

            // First analysis after 2 seconds
            setTimeout(() => {
                if (faceDetected && lastLandmarks) analyzeLandmarks();
            }, 2000);

        } catch (err) {
            document.getElementById('status-pill').innerText = '❌ Camera access denied.';
        }
    }

    function analyzeLandmarks() {
        if (!lastLandmarks || isAnalyzing) return;

        // Eye Aspect Ratio (EAR)
        const leftEyeTop = lastLandmarks[159];
        const leftEyeBottom = lastLandmarks[145];
        const leftEyeLeft = lastLandmarks[33];
        const leftEyeRight = lastLandmarks[133];
        const leftEAR = Math.abs(leftEyeTop.y - leftEyeBottom.y) / Math.abs(leftEyeLeft.x - leftEyeRight.x);

        const rightEyeTop = lastLandmarks[386];
        const rightEyeBottom = lastLandmarks[374];
        const rightEyeLeft = lastLandmarks[362];
        const rightEyeRight = lastLandmarks[263];
        const rightEAR = Math.abs(rightEyeTop.y - rightEyeBottom.y) / Math.abs(rightEyeLeft.x - rightEyeRight.x);

        const avgEAR = (leftEAR + rightEAR) / 2;

        // Mouth ratio
        const mouthLeft = lastLandmarks[61];
        const mouthRight = lastLandmarks[291];
        const mouthTop = lastLandmarks[0];
        const mouthBottom = lastLandmarks[17];
        const mouthWidth = Math.abs(mouthRight.x - mouthLeft.x);
        const mouthHeight = Math.abs(mouthTop.y - mouthBottom.y);
        const mouthRatio = mouthHeight / mouthWidth;

        // Build text description
        const eyeDesc = avgEAR < 0.15 ? "eyes nearly closed, very tired" :
                        avgEAR < 0.22 ? "eyes slightly droopy, tired" :
                        avgEAR < 0.30 ? "eyes normally open, alert" : "eyes wide open, very alert or surprised";

        const mouthDesc = mouthRatio > 0.15 ? "mouth open" :
                          mouthRatio > 0.05 ? "slight smile or neutral" : "mouth closed or tight";

        sendToGroq(eyeDesc, mouthDesc, avgEAR, mouthRatio);
    }

    async function sendToGroq(eyeDesc, mouthDesc, ear, mouthRatio) {
        isAnalyzing = true;
        document.getElementById('live-mood').innerText = '🔍 Analyzing...';

        const prompt = `You are a mood detection expert analyzing facial landmark data.

Facial data:
- Eyes: ${eyeDesc} (EAR: ${ear.toFixed(3)})
- Mouth: ${mouthDesc} (ratio: ${mouthRatio.toFixed(3)})

Respond EXACTLY in this format only, nothing else:
MOOD: [one of: Happy, Tired, Stressed, Neutral, Sad, Energetic]
SUGGESTION: [one short helpful suggestion, max 12 words]`;

        try {
            const res = await fetch('/api/selfie-mood', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ image_data: prompt })
            });

            const data = await res.json();
            currentMood = data.detected_mood;
            currentSuggestion = data.suggestion;

            const emoji = getMoodEmoji(currentMood);
            document.getElementById('live-mood').innerText = `${emoji} ${currentMood}`;
            document.getElementById('mood-result').innerHTML = `
                <div class="mood-badge">${emoji} ${currentMood}</div>
                <p class="suggestion-text">${currentSuggestion}</p>
            `;
            document.getElementById('btn-save').disabled = false;

        } catch (err) {
            document.getElementById('live-mood').innerText = '⚠️ Analysis failed';
        }

        isAnalyzing = false;
    }

    async function saveMemory() {
        if (!currentMood) return;

        const saveBtn = document.getElementById('btn-save');
        saveBtn.disabled = true;
        saveBtn.innerText = 'Saving...';

        // Capture frame
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        tempCanvas.getContext('2d').drawImage(video, 0, 0);
        const imageData = tempCanvas.toDataURL('image/jpeg', 0.7);

        try {
            const res = await fetch('/api/selfie-save', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    image_data: imageData,
                    detected_mood: currentMood,
                    suggestion: currentSuggestion
                })
            });

            if (res.ok) {
                document.getElementById('saved-msg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('saved-msg').style.display = 'none';
                    saveBtn.disabled = false;
                    saveBtn.innerText = '📸 Save as Memory';
                }, 2500);
            }
        } catch (err) {
            saveBtn.disabled = false;
            saveBtn.innerText = '📸 Save as Memory';
        }
    }

    function getMoodEmoji(mood) {
        const map = {
            'Happy': '😊', 'Tired': '😴', 'Stressed': '😟',
            'Neutral': '😐', 'Sad': '😢', 'Energetic': '⚡'
        };
        return map[mood] || '😐';
    }

    startCamera();
</script>
</body>
</html>
